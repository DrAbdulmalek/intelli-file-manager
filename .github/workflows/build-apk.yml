name: Build Android APK

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo5 cmake libffi-dev libssl-dev \
            libltdl-dev libbz2-dev libreadline-dev \
            libsqlite3-dev wget curl llvm \
            libblas-dev liblapack-dev gfortran \
            libjpeg-dev libpng-dev libfreetype6-dev \
            patchelf

      - name: Cache Buildozer global
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-global-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-global-${{ runner.os }}-

      - name: Cache Buildozer Android
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: buildozer-android-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-android-${{ runner.os }}-

      - name: Install Buildozer & Cython
        run: |
          pip install --upgrade pip setuptools
          pip install buildozer==1.5.0 cython==3.0.11

      - name: Build APK (debug)
        run: |
          buildozer android debug 2>&1 | tail -80
        env:
          BUILDOZER_WARN_ON_ROOT: 1

      - name: List built APK
        run: ls -lh bin/*.apk 2>/dev/null || echo "APK not found in bin/"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: intellifile-debug-apk
          path: bin/*.apk
          if-no-files-found: warn

      - name: Release APK on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: bin/*.apk
