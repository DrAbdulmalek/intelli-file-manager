name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-lint:
    name: Python Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install ruff
      - name: Ruff check
        run: ruff check src/ cli.py main.py

  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    needs: python-lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libxcb-xinerama0 libxcb-cursor0 libegl1
      - name: Install Python deps
        run: pip install -e ".[dev]" 2>/dev/null || pip install -r requirements.txt pytest
      - name: Run unit tests
        run: QT_QPA_PLATFORM=offscreen pytest tests/unit/ -v --tb=short -m "not slow"
      - name: Run integration tests
        run: QT_QPA_PLATFORM=offscreen pytest tests/integration/ -v --tb=short -m "not slow"
        continue-on-error: true

  node-build:
    name: Next.js Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        working-directory: web
        run: npm install
      - name: Lint
        working-directory: web
        run: npm run lint
      - name: Build
        working-directory: web
        run: npm run build